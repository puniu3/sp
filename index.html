<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- no-cache so a stale demo.html can't reference an old gui.js while we're
     actively debugging. Safe to leave in during development. -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Splendor · Codex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=IM+Fell+English+SC&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* Codex palette */
    --paper:      #F1E7CE;
    --paper-2:    #E8DCBB;
    --paper-3:    #DFD2A6;
    --paper-light:#FAF3DC;
    --ink:        #3A2418;
    --ink-2:      #5A4028;
    --ink-3:      rgba(58,36,24,0.55);
    --rule:       rgba(58,36,24,0.22);
    --rule-soft:  rgba(58,36,24,0.12);
    --sienna:     #8B5A2B;
    --sienna-dk:  #6B4220;
    --vermilion:  #8B1A1A;
    --vermilion-dk: #6B1010;
    --gold:       #B8922A;
    --gold-lt:    #D9B344;
    /* Gems */
    --gem-W:#FAF3DC;
    --gem-U:#1E3A5F;
    --gem-G:#2F5E3A;
    --gem-R:#822121;
    --gem-B:#1A1410;
    --gem-O:#B8922A;
    /* Tile sprite sheet — consumed by .card .art and (where used) .nchip art */
    --tiles: url("assets/tiles.webp");
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#241810;color:var(--ink);font-family:'Cormorant Garamond', serif;}
  html, body{ width:100%; height:100%; overflow:hidden; }
  body{
    background:
      radial-gradient(ellipse at 50% 50%, #2f1d12 0%, #1a0f08 70%, #0c0604 100%);
    display:flex; align-items:center; justify-content:center;
    padding: 0;
  }
  /* Fit-to-viewport scaler — keeps the stage pixel-perfect */
  .fit{
    width: 1100px; height: 870px;
    transform-origin: center center;
    flex: none;
    position: relative;
  }

  /* ============ STAGE ============ */
  .stage{
    width: 1100px; height: 870px;
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(139,90,43,0.10) 0 2px, transparent 3px),
      radial-gradient(ellipse at 80% 30%, rgba(139,90,43,0.07) 0 2px, transparent 3px),
      radial-gradient(ellipse at 40% 70%, rgba(139,90,43,0.09) 0 2px, transparent 3px),
      radial-gradient(ellipse at 90% 90%, rgba(139,90,43,0.12) 0 2px, transparent 3px),
      radial-gradient(ellipse at 10% 90%, rgba(139,90,43,0.08) 0 1.5px, transparent 2px),
      linear-gradient(180deg, #F6EDD5 0%, #E8DCBB 100%);
    position: relative;
    overflow: hidden;
    border: 1px solid #6B4220;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 6px #3A2418, inset 0 0 80px rgba(139,90,43,0.12);
    display: flex;
    flex-direction: column;
    font-size: 15px;
  }

  /* vine corners */
  .stage::before, .stage::after{
    content:""; position:absolute; width: 120px; height: 120px;
    pointer-events:none; opacity: 0.22;
    background-image:
      radial-gradient(circle at 20% 20%, var(--vermilion) 0 5px, transparent 6px),
      radial-gradient(circle at 80% 40%, var(--gold) 0 3px, transparent 4px),
      radial-gradient(circle at 40% 70%, var(--sienna) 0 2px, transparent 3px);
  }
  .stage::before{ top: 10px; left: 10px; }
  .stage::after{ bottom: 10px; right: 10px; transform: rotate(180deg); }

  /* ============ HEADER ============ */
  .hdr{
    padding: 14px 24px 12px;
    border-bottom: 3px double var(--vermilion);
    display: flex; align-items: center; gap: 18px;
    position: relative;
    z-index: 3;
  }
  .logo{
    font-family: 'IM Fell English SC', serif;
    font-size: 26px; letter-spacing: 0.22em;
    color: var(--ink);
    text-transform: uppercase;
    position: relative;
  }
  .logo::before{ content: "✦"; margin-right: 12px; color: var(--vermilion); }
  .logo::after { content: "✦"; margin-left: 12px;  color: var(--vermilion); }
  .turn{
    font-family: 'IM Fell English SC', serif;
    font-size: 11px; letter-spacing: 0.22em;
    color: var(--ink-3);
    text-transform: uppercase;
  }
  .hdr-spacer{ flex: 1; }

  /* Sound toggle — echoes the opp chip styling so it sits in the masthead */
  .sound-toggle{
    width: 30px; height: 30px; padding: 0;
    border: 1px solid var(--sienna);
    background: var(--paper-light);
    color: var(--ink);
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.15s;
  }
  .sound-toggle.muted{ opacity: 0.65; border-color: var(--ink-3); color: var(--ink-3); }
  @media (hover: hover) {
    .sound-toggle:hover{ background: #FFF5D8; border-color: var(--gold); }
    .sound-toggle.muted:hover{ opacity: 1; }
  }
  .sound-toggle .sound-icon{ display: block; }

  /* ============ OPPONENT CHIPS ============ */
  .opps{ display: flex; gap: 10px; align-items: center; }
  .opp{
    position: relative;
    cursor: pointer;
    border: 1px solid var(--sienna);
    background: var(--paper-light);
    color: var(--ink);
    font-family: 'IM Fell English SC', serif;
    font-size: 12px; letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px 6px 14px;
    display: flex; align-items: center; gap: 12px;
    white-space: nowrap;
    transition: background 320ms cubic-bezier(.4,0,.2,1),
                border-color 320ms cubic-bezier(.4,0,.2,1),
                box-shadow 320ms cubic-bezier(.4,0,.2,1);
    user-select: none;
  }
  @media (hover: hover) {
    .opp:hover{ background: #FFF5D8; border-color: var(--gold); }
  }
  .opp.lead{
    border-color: var(--vermilion);
    background: linear-gradient(180deg, #FAF3DC 0%, #F1E7CE 100%);
    box-shadow: 0 0 0 1px var(--gold), inset 0 0 0 1px rgba(255,220,120,0.3);
  }
  .opp.active{
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold-lt), 0 2px 8px rgba(184,146,42,0.35);
  }
  .opp .opp-pts{
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }
  .opp.lead .opp-pts{ color: var(--vermilion); }

  .opp .drawer{
    display: flex; align-items: center;
    overflow: hidden;
    max-width: 0;
    opacity: 0;
    transition: max-width 440ms cubic-bezier(.4,0,.2,1),
                opacity 260ms cubic-bezier(.4,0,.2,1),
                margin-left 440ms cubic-bezier(.4,0,.2,1),
                padding-left 440ms cubic-bezier(.4,0,.2,1);
    margin-left: 0;
    padding-left: 0;
    border-left: 1px solid transparent;
    gap: 14px;
  }
  .opp.open{
    background: var(--paper-light);
    border-color: var(--vermilion);
    box-shadow: 0 4px 14px rgba(58,36,24,0.2), 0 0 0 1px var(--gold);
    z-index: 4;
  }
  .opp.open .drawer{
    max-width: 540px;
    opacity: 1;
    margin-left: 12px;
    padding-left: 14px;
    border-left: 1px solid var(--rule-soft);
  }
  .drawer .dlabel{
    font-size: 9px; letter-spacing: 0.18em;
    color: var(--ink-3);
    font-family: 'IM Fell English SC', serif;
    margin-right: 2px;
  }
  .drawer .drow{ display: flex; align-items: center; gap: 5px; }

  /* small gems (inside drawer, inside self strip, inside action bar) */
  .sgem{
    width: 22px; height: 22px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 12px;
    border: 1.5px solid var(--sienna);
    box-shadow: 0 1px 2px rgba(58,36,24,0.25);
    position: relative;
  }
  .sgem.sq{ border-radius: 3px; }
  .sgem[data-c=W]{ background: var(--gem-W); color: var(--ink); }
  .sgem[data-c=U]{ background: var(--gem-U); color: var(--paper-light); }
  .sgem[data-c=G]{ background: var(--gem-G); color: var(--paper-light); }
  .sgem[data-c=R]{ background: var(--gem-R); color: var(--paper-light); }
  .sgem[data-c=B]{ background: var(--gem-B); color: var(--paper-light); }
  .sgem[data-c=O]{ background: radial-gradient(circle at 30% 30%, var(--gold-lt), var(--gem-O)); color: var(--ink); }
  .sgem.zero{ opacity: 0.28; }

  /* drawer stagger */
  .opp .drawer .dlabel,
  .opp .drawer .drow,
  .opp .drawer .vrule,
  .opp .drawer .res{
    transform: translateX(-8px);
    opacity: 0;
    transition: transform 360ms cubic-bezier(.4,0,.2,1),
                opacity 320ms cubic-bezier(.4,0,.2,1);
  }
  .opp.open .drawer .dlabel,
  .opp.open .drawer .drow,
  .opp.open .drawer .vrule,
  .opp.open .drawer .res{
    transform: translateX(0); opacity: 1;
  }
  .opp.open .drawer > *:nth-child(1){ transition-delay: 120ms; }
  .opp.open .drawer > *:nth-child(2){ transition-delay: 165ms; }
  .opp.open .drawer > *:nth-child(3){ transition-delay: 205ms; }
  .opp.open .drawer > *:nth-child(4){ transition-delay: 240ms; }
  .opp.open .drawer > *:nth-child(5){ transition-delay: 275ms; }
  .opp.open .drawer > *:nth-child(6){ transition-delay: 310ms; }
  .opp.open .drawer > *:nth-child(7){ transition-delay: 345ms; }

  .vrule{
    width: 1px; height: 20px; background: var(--rule-soft); align-self: center;
    flex: none;
  }
  .res{ display: inline-flex; gap: 4px; align-items: center; }
  .res-card{
    width: 18px; height: 24px; border: 1px solid var(--sienna);
    background: var(--paper-light);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 10px;
    color: var(--vermilion);
  }

  /* ============ NOBLE RIBBON ============ */
  .ribbon{
    padding: 10px 24px;
    background: rgba(139,90,43,0.08);
    border-bottom: 1px solid var(--rule);
    display: flex; align-items: center; gap: 12px;
    position: relative; z-index: 2;
  }
  .ribbon-lbl{
    font-family: 'IM Fell English SC', serif;
    font-size: 10px; letter-spacing: 0.22em;
    color: var(--ink-3);
    min-width: 100px;
    text-transform: uppercase;
  }
  .ribbon-noble-list{ display: flex; gap: 10px; flex: 1; flex-wrap: wrap; }

  .nchip{
    width: 120px;
    background: var(--paper-light);
    border: 1px solid var(--sienna);
    padding: 0;
    position: relative;
    display: flex; flex-direction: column;
    box-shadow: 0 1px 3px rgba(58,36,24,0.2);
    overflow: hidden;
  }
  .nchip.claim{
    border: 2px solid var(--vermilion);
    box-shadow: 0 0 0 1px var(--gold), 0 3px 8px rgba(139,26,26,0.25);
    cursor: pointer;
  }
  .nchip.claim.selected{
    box-shadow: 0 0 0 2px var(--gold-lt), 0 0 0 4px rgba(184,146,42,0.4), 0 4px 12px rgba(139,26,26,0.3);
  }
  .nchip.dim{ opacity: 0.6; }
  .nchip .head{
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 8px 10px 6px;
    border-bottom: 1px solid var(--rule-soft);
    background: linear-gradient(180deg, #F3E7C6 0%, var(--paper-light) 100%);
  }
  .nchip .head .label{
    font-family: 'IM Fell English SC', serif;
    font-size: 9.5px; letter-spacing: 0.18em;
    color: var(--ink-3);
    text-transform: uppercase;
  }
  .nchip .head .pts{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--ink);
    line-height: 0.9;
    font-feature-settings: 'lnum';
  }
  .nchip.claim .head .pts{ color: var(--vermilion); }
  .nchip .foot{
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 7px 6px;
    gap: 4px;
  }
  .nchip .reqs{ display: flex; gap: 3px; }
  .nchip .check{
    width: 14px; height: 14px; border-radius: 50%;
    border: 1.5px solid var(--vermilion);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--vermilion);
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 10px;
    flex: none;
  }
  .nchip .check.pending{ border-color: rgba(58,36,24,0.25); color: transparent; }
  .nchip .bar{
    position: absolute; left: 0; right: 0; bottom: 0; height: 3px;
    background: rgba(58,36,24,0.12);
  }
  .nchip .bar > span{ position: absolute; inset: 0; background: var(--sienna); }
  .nchip.claim .bar > span{ background: var(--vermilion); }

  .pip{
    width: 18px; height: 18px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 11px;
    border: 1px solid rgba(58,36,24,0.3);
  }
  .pip[data-c=W]{ background: var(--gem-W); color: var(--ink); }
  .pip[data-c=U]{ background: var(--gem-U); color: var(--paper-light); }
  .pip[data-c=G]{ background: var(--gem-G); color: var(--paper-light); }
  .pip[data-c=R]{ background: var(--gem-R); color: var(--paper-light); }
  .pip[data-c=B]{ background: var(--gem-B); color: var(--paper-light); }
  .pip.met{ border: 1.5px solid var(--vermilion); }

  /* ============ MAIN AREA ============ */
  .main{
    flex: 1;
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 16px;
    padding: 16px 20px;
    position: relative; z-index: 1;
    min-height: 0;
  }
  .panel{
    background: rgba(255,248,228,0.5);
    border: 1px solid var(--rule);
    padding: 14px 14px 12px;
    position: relative;
  }
  .panel-head{
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .gold-mini{
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 7px;
    font-family: 'IM Fell English SC', serif;
    font-size: 10px; letter-spacing: 0.2em; color: var(--ink-3);
    text-transform: uppercase;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 999px;
    transition: background 160ms;
  }
  .gold-mini.disabled{ cursor: default; opacity: 0.55; }
  .gold-mini.dim{ opacity: 0.45; cursor: default; }
  @media (hover: hover){
    .gold-mini:not(.disabled):not(.dim):hover{ background: rgba(184,146,42,0.15); }
  }
  .gold-mini .dot{
    width: 24px; height: 24px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, var(--gold-lt), var(--gold));
    border: 1.5px solid var(--gold);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 700;
    box-shadow: 0 1px 3px rgba(139,90,43,0.3);
  }
  .panel-step{
    font-family: 'IM Fell English SC', serif;
    font-size: 11px; letter-spacing: 0.22em;
    color: var(--ink-3);
    text-transform: uppercase;
  }

  /* Supply gems */
  .gem-grid{
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    justify-items: center;
    padding: 4px 0 8px;
  }
  .gem{
    width: 66px; height: 66px; border-radius: 50%;
    border: 3px solid var(--sienna);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    box-shadow: 0 3px 8px rgba(58,36,24,0.3), inset 0 1px 3px rgba(255,255,255,0.3);
    cursor: pointer;
    transition: transform 180ms, box-shadow 180ms;
    position: relative;
  }
  @media (hover: hover) {
    .gem:hover{ transform: translateY(-2px); box-shadow: 0 5px 14px rgba(58,36,24,0.4), inset 0 1px 3px rgba(255,255,255,0.3); }
  }
  .gem[data-c=W]{ background: var(--gem-W); color: var(--ink); }
  .gem[data-c=U]{ background: var(--gem-U); color: var(--paper-light); }
  .gem[data-c=G]{ background: var(--gem-G); color: var(--paper-light); }
  .gem[data-c=R]{ background: var(--gem-R); color: var(--paper-light); }
  .gem[data-c=B]{ background: var(--gem-B); color: var(--paper-light); }
  .gem[data-c=O]{ background: radial-gradient(circle at 30% 30%, var(--gold-lt), var(--gem-O)); color: var(--ink); }
  .gem.zero{ opacity: 0.3; cursor: default; transform: none !important; box-shadow: none; }
  .gem.sel{ outline: 3px solid var(--vermilion); outline-offset: 3px; }
  .gem.sel2{
    outline: 3px solid var(--gold-lt);
    outline-offset: 3px;
    box-shadow: 0 0 0 6px rgba(184,146,42,0.25), 0 3px 8px rgba(58,36,24,0.3);
  }
  .gem .gcount{ font-size: 24px; line-height: 1; }
  .gem .glbl{ font-size: 9px; letter-spacing: 0.18em; opacity: 0.72; margin-top: 2px; font-family: 'IM Fell English SC', serif;}

  /* Supply in discard mode — pulls from player tokens, click to discard */
  .gem.discard{ cursor: pointer; outline: 2px dashed var(--vermilion); outline-offset: 3px; }
  .gem.discard.zero{ cursor: default; outline: none; }

  /* Market */
  .market{
    display: flex; flex-direction: column; gap: 8px;
    width: 704px;
    max-width: 100%;
    margin: 0 auto;
  }
  .row-market{ display: flex; gap: 8px; align-items: stretch; }
  .deck{
    width: 64px; flex: none;
    background: #3A2418;
    border: 2px solid var(--sienna);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--paper-light);
    font-family: 'IM Fell English SC', serif;
    position: relative;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.4);
  }
  .deck.empty{ opacity: 0.4; }
  .deck .dlv{ font-size: 10px; letter-spacing: 0.18em; opacity: 0.6; }
  .deck .dc{ font-size: 30px; font-weight: 700; color: var(--gold-lt); font-family: 'Cormorant Garamond', serif; line-height: 1; }

  .card{
    width: 152px; flex: none;
    aspect-ratio: 1 / 1;
    background: var(--paper-light);
    border: 1px solid rgba(58,36,24,0.3);
    box-shadow: 0 1px 3px rgba(58,36,24,0.2);
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column;
    cursor: pointer;
    transition: transform 180ms, box-shadow 180ms;
  }
  @media (hover: hover) {
    .card:hover{ transform: translateY(-2px); box-shadow: 0 6px 14px rgba(58,36,24,0.28); }
  }
  .card.sel{
    outline: 2px solid var(--vermilion);
    outline-offset: -2px;
    box-shadow: 0 0 0 3px rgba(139,26,26,0.25), 0 4px 10px rgba(58,36,24,0.25);
  }
  .card.buy{
    box-shadow: 0 0 0 1px var(--gold), 0 2px 4px rgba(58,36,24,0.2);
  }
  .card.buy.sel{
    box-shadow: 0 0 0 2px var(--gold-lt), 0 0 0 5px rgba(184,146,42,0.35), 0 4px 10px rgba(58,36,24,0.3);
    outline: 2px solid var(--vermilion);
    outline-offset: -2px;
  }
  .card.empty{
    background: rgba(58,36,24,0.06);
    border: 1px dashed rgba(58,36,24,0.28);
    box-shadow: none;
    cursor: default;
    visibility: hidden;
  }
  .card .art{
    position: absolute; inset: 0; z-index: 0;
    background-image: var(--tiles);
    background-repeat: no-repeat;
    background-size: 1000% 1000%;
    background-position: var(--tilepos, 0 0);
  }
  .card .art::after{
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 55%, transparent 45%, rgba(232,216,178,0.35) 100%);
    pointer-events: none;
  }
  .card .bandTop, .card .bandBot{
    position: relative; z-index: 1;
    padding: 7px 9px;
    display: flex; align-items: center; gap: 7px;
  }
  .card .bandTop{
    background: linear-gradient(to bottom, rgba(250,243,220,0.95), transparent 85%);
  }
  .card .bandBot{
    background: linear-gradient(to top, rgba(250,243,220,0.96), transparent 85%);
    margin-top: auto;
    flex-wrap: wrap;
    gap: 5px;
  }
  .card .bonus{
    width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid rgba(58,36,24,0.35);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.25), 0 1px 2px rgba(58,36,24,0.25);
  }
  .card .bonus[data-c=W]{ background: var(--gem-W); }
  .card .bonus[data-c=U]{ background: var(--gem-U); }
  .card .bonus[data-c=G]{ background: var(--gem-G); }
  .card .bonus[data-c=R]{ background: var(--gem-R); }
  .card .bonus[data-c=B]{ background: var(--gem-B); }
  .card .pts{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    color: var(--vermilion);
    margin-left: auto;
    line-height: 1;
    font-feature-settings: 'lnum';
  }
  .card.t3 .pts{ font-size: 34px; }
  .card.t2 .pts{ font-size: 28px; }
  .card.t1 .pts{ font-size: 22px; }

  /* Larger cost pips on market cards — ribbon nobles keep the 18px pip. */
  .card .bandBot .pip{
    width: 26px; height: 26px;
    font-size: 15px;
    border-width: 1.5px;
  }
  .card .bandBot .pip.met{ border-width: 2px; }

  /* ============ SELF STRIP ============ */
  .self{
    padding: 12px 20px;
    background: rgba(139,90,43,0.12);
    border-top: 1px solid var(--rule);
    display: flex; align-items: center; gap: 14px;
    font-family: 'IM Fell English SC', serif;
    font-size: 11px; letter-spacing: 0.14em;
    color: var(--ink);
    text-transform: uppercase;
    position: relative; z-index: 2;
    transition: background 320ms ease, box-shadow 320ms ease;
  }
  .self.active{
    background: linear-gradient(180deg, rgba(139,90,43,0.18) 0%, rgba(184,146,42,0.12) 100%);
    box-shadow: inset 0 2px 0 var(--gold-lt);
  }
  .self .you{ font-family: 'IM Fell English SC', serif; font-size: 13px; font-weight: 600; letter-spacing: 0.2em; }
  .self .you-pts{ font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 700; color: var(--vermilion); line-height: 1; margin-right: 4px; }
  .self .you-lbl{ opacity: 0.55; font-size: 10px; }
  .self .divider{ width: 1px; height: 26px; background: var(--rule); }
  .self .field{ display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .self .fname{ color: var(--ink-3); margin-right: 4px; }
  .self-flex{ flex: 1; }

  .reserved-stack{ display: inline-flex; gap: 4px; }
  .rcard{
    width: 28px; height: 38px;
    background: var(--paper-light);
    border: 1px solid var(--sienna);
    position: relative;
    cursor: pointer;
    transition: transform 160ms, box-shadow 160ms;
  }
  .rcard::after{
    content: attr(data-pts);
    position: absolute; top: 2px; right: 4px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700; font-size: 12px; color: var(--vermilion);
  }
  .rcard::before{
    content: attr(data-bonus);
    position: absolute; bottom: 2px; left: 4px;
    font-family: 'IM Fell English SC', serif;
    font-size: 9px; color: var(--ink-3);
  }
  @media (hover: hover){
    .rcard:hover{ transform: translateY(-2px); box-shadow: 0 3px 6px rgba(58,36,24,0.3); }
  }
  .rcard.sel{
    outline: 2px solid var(--vermilion);
    outline-offset: -2px;
    box-shadow: 0 0 0 3px rgba(139,26,26,0.25);
  }
  .rcard.buy{ box-shadow: 0 0 0 1px var(--gold); }

  /* ============ ACTION BAR ============ */
  .action{
    padding: 12px 24px;
    background: #3A2418;
    color: var(--paper-light);
    border-top: 1px solid var(--sienna);
    display: flex; align-items: center; gap: 14px;
    font-size: 14px;
    min-height: 64px;
  }
  .action .alabel{
    font-family: 'IM Fell English SC', serif;
    font-size: 11px; letter-spacing: 0.2em;
    color: rgba(244,234,210,0.6);
    text-transform: uppercase;
  }
  .action .amsg{
    font-style: italic; color: rgba(244,234,210,0.9);
  }
  .action .spacer{ flex: 1; }

  /* dark-bg override so sgem pills stay legible */
  .action .sgem{
    border-color: rgba(244,234,210,0.55);
    box-shadow: 0 1px 2px rgba(0,0,0,0.35);
  }
  .action .sgem.zero{ opacity: 0.3; }
  .action .pip{
    border-color: rgba(244,234,210,0.55);
  }

  .sel-card{
    display: inline-flex; align-items: center; gap: 10px;
    padding: 4px 12px 4px 8px;
    background: rgba(244,234,210,0.08);
    border: 1px solid rgba(244,234,210,0.2);
  }
  .sel-bonus{
    width: 14px; height: 14px; border-radius: 50%;
    border: 1px solid rgba(244,234,210,0.55);
    flex: none;
  }
  .sel-bonus[data-c=W]{ background: var(--gem-W); }
  .sel-bonus[data-c=U]{ background: var(--gem-U); }
  .sel-bonus[data-c=G]{ background: var(--gem-G); }
  .sel-bonus[data-c=R]{ background: var(--gem-R); }
  .sel-bonus[data-c=B]{ background: var(--gem-B); }
  .sel-title{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--paper-light);
  }
  .sel-pts{
    font-family: 'IM Fell English SC', serif;
    font-size: 10px; letter-spacing: 0.16em;
    color: var(--gold-lt);
    text-transform: uppercase;
  }
  .sel-arrow{
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: rgba(244,234,210,0.35);
    line-height: 1;
    padding: 0 4px;
  }
  .sel-pay{ display: inline-flex; align-items: center; gap: 5px; }

  .btn{
    font-family: 'IM Fell English SC', serif;
    font-weight: 600;
    font-size: 12px; letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 8px 18px;
    cursor: pointer;
    border: 0;
    transition: transform 120ms, box-shadow 120ms, background 160ms;
  }
  .btn:active{ transform: translateY(1px); }
  .btn.ghost{
    background: transparent;
    color: var(--paper-light);
    border: 1px solid rgba(244,234,210,0.35);
  }
  @media (hover: hover){
    .btn.ghost:hover{ background: rgba(244,234,210,0.08); }
  }
  .btn.primary{
    background: var(--vermilion);
    color: var(--paper-light);
    border: 1px solid var(--gold);
    box-shadow: 0 0 0 1px rgba(184,146,42,0.3);
  }
  @media (hover: hover) {
    .btn.primary:hover{ background: var(--vermilion-dk); }
  }
  .btn.disabled{ pointer-events: none; opacity: 0.4; }

  /* ============ SETUP SCREEN ============ */
  .setup-screen{
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(139,90,43,0.10) 0 2px, transparent 3px),
      radial-gradient(ellipse at 80% 30%, rgba(139,90,43,0.07) 0 2px, transparent 3px),
      radial-gradient(ellipse at 40% 70%, rgba(139,90,43,0.09) 0 2px, transparent 3px),
      linear-gradient(180deg, #F6EDD5 0%, #E8DCBB 100%);
    border: 1px solid #6B4220;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 6px #3A2418, inset 0 0 80px rgba(139,90,43,0.12);
  }
  .setup-panel{
    padding: 44px 56px;
    text-align: center;
    border: 2px double var(--vermilion);
    background: rgba(255,248,228,0.4);
    max-width: 560px;
  }
  .setup-title{
    font-family: 'IM Fell English SC', serif;
    font-size: 44px; letter-spacing: 0.22em;
    color: var(--ink);
    text-transform: uppercase;
    position: relative;
    padding: 0 40px;
  }
  .setup-title::before{ content: "✦"; position: absolute; left: 0; color: var(--vermilion); }
  .setup-title::after { content: "✦"; position: absolute; right: 0; color: var(--vermilion); }
  .setup-subtitle{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--ink-2);
    margin: 16px 0 28px;
  }
  .setup-options{
    display: flex; gap: 14px; justify-content: center;
  }
  .setup-btn{ min-width: 120px; padding: 12px 20px; font-size: 14px; }
  .setup-hint{
    margin-top: 22px;
    font-family: 'IM Fell English SC', serif;
    font-size: 10px; letter-spacing: 0.22em;
    color: var(--ink-3);
    text-transform: uppercase;
  }

  /* ============ ANIMATIONS ============ */
  @keyframes scoreBump{
    0%   { transform: translateY(0); }
    30%  { transform: translateY(-6px) scale(1.18); color: var(--gold); text-shadow: 0 0 14px rgba(232,188,90,0.6); }
    100% { transform: translateY(0); }
  }
  .score-bump{ animation: scoreBump 700ms cubic-bezier(.34,1.56,.64,1); }

  /* Key-based remount pop on counters (reused from the previous build).
     Keeping per-value animation keeps changes visible even without a proper
     event queue. */
  .pop-count{
    display: inline-block;
    animation: count-pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  }
  @keyframes count-pop{
    0%   { transform: scale(0.3); filter: brightness(2) drop-shadow(0 0 6px var(--gold-lt)); }
    45%  { transform: scale(1.55); filter: brightness(1.6) drop-shadow(0 0 10px var(--gold-lt)); }
    100% { transform: scale(1);   filter: none; }
  }
  .pop-score{
    display: inline-block;
    animation: score-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
  }
  @keyframes score-pop{
    0%   { transform: scale(0.4); color: var(--gold-lt); text-shadow: 0 0 8px var(--gold-lt); }
    50%  { transform: scale(1.65); color: var(--gold-lt); text-shadow: 0 0 28px rgba(255,235,150,1); }
    100% { transform: scale(1); }
  }
  .tile-in{ animation: tile-in 0.35s ease-out backwards; }
  @keyframes tile-in{
    from { opacity: 0; transform: scale(0.9) translateY(4px); }
    to   { opacity: 1; transform: scale(1)   translateY(0);   }
  }

  /* Board dim while opponent thinks. Using a static opacity + transition
     (rather than a CSS animation) keeps both edges smooth: the previous
     animation-based "breath" jumped to 0.78 the instant `.thinking` was
     added and snapped back to 1 when removed, because CSS transitions
     aren't triggered by animation-removal — that caused a whole-screen
     flicker at every phase change. */
  .main, .ribbon, .self{
    transition: opacity 320ms ease;
  }
  .thinking .main,
  .thinking .ribbon,
  .thinking .self{
    opacity: 0.82;
  }

  /* ============ FLIGHT CHOREOGRAPHY (ported from the Codex reference) ============ */
  .flyer{
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    will-change: transform, opacity;
    transform-origin: center;
  }
  @keyframes pulseOut{
    0%   { box-shadow: 0 0 0 0 rgba(184,146,42,0.7), 0 0 0 0 rgba(184,146,42,0.35); }
    60%  { box-shadow: 0 0 0 12px rgba(184,146,42,0.0), 0 0 0 24px rgba(184,146,42,0.0); }
    100% { box-shadow: 0 0 0 0 rgba(184,146,42,0), 0 0 0 0 rgba(184,146,42,0); }
  }
  .pulse{ animation: pulseOut 700ms ease-out; border-radius: 50%; }

  /* Card vanishing (after purchase) — collapse in place, hiding contents */
  @keyframes cardVanish{
    0%   { transform: translateY(0) scale(1);    opacity: 1; filter: brightness(1); }
    55%  { transform: translateY(4px) scale(0.94); opacity: 0.25; filter: brightness(1.4); }
    100% { transform: translateY(2px) scale(0.96); opacity: 0; filter: brightness(1); }
  }
  .card.vanishing{
    animation: cardVanish 420ms ease-out forwards;
    pointer-events: none;
  }
  .card.empty-slot{
    background: rgba(58,36,24,0.08);
    border: 1px dashed rgba(58,36,24,0.28);
    box-shadow: none;
    opacity: 1;
  }
  .card.empty-slot > *{ opacity: 0; }

  /* New card being dealt — flies in from deck with a flip */
  @keyframes cardDeal{
    0%   { transform: var(--deal-from, translateY(0)); opacity: 0.0; box-shadow: 0 18px 40px rgba(0,0,0,0.35); }
    25%  { opacity: 1; }
    70%  { transform: translate(0,-4px) rotateY(-8deg) scale(1.02); }
    100% { transform: translate(0,0) rotateY(0) scale(1); box-shadow: 0 1px 3px rgba(58,36,24,0.2); }
  }
  .card.dealing{
    animation: cardDeal 620ms cubic-bezier(.4,.1,.2,1) forwards;
    transform-style: preserve-3d;
    backface-visibility: hidden;
    z-index: 2;
  }
  /* Suppress the generic mount-in on cards that are doing a flip-in, so the
     two animations don't stack. */
  .card.dealing.tile-in{ animation: cardDeal 620ms cubic-bezier(.4,.1,.2,1) forwards; }

  /* Deck "flash" when a card is drawn */
  @keyframes deckDraw{
    0%, 100% { box-shadow: inset 0 0 10px rgba(0,0,0,0.4); }
    40%      { box-shadow: inset 0 0 10px rgba(0,0,0,0.4), 0 0 0 2px var(--gold-lt), 0 0 18px rgba(232,188,90,0.5); }
  }
  .deck.drawing{ animation: deckDraw 520ms ease-out; }

  /* Noble vanishing — collapses its width to 0 so the ribbon reflows */
  @keyframes nobleVanish{
    0%   { transform: scale(1) rotate(0);        opacity: 1; max-width: 260px; margin-right: 10px; }
    40%  { transform: scale(0.92) rotate(-2deg); opacity: 0.4; }
    100% { transform: scale(0.6)  rotate(-4deg); opacity: 0; max-width: 0; margin-right: 0; }
  }
  .ribbon-noble-list > .vanishing{
    animation: nobleVanish 540ms cubic-bezier(.4,.1,.2,1) forwards;
    pointer-events: none;
    overflow: hidden;
  }

  /* Honor prefers-reduced-motion for ambient/background animations, but keep
     flyer choreography (gems, cards, nobles leaving/arriving) intact: those
     flights carry meaningful game state ("which gems came from where"), not
     decoration. A clone whose transition is zeroed teleports invisibly for
     ~900ms of its own lifetime, which reads as a broken UI. */
  @media (prefers-reduced-motion: reduce){
    *:not(.flyer):not(.flyer *), *::before, *::after{
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>
<div id="root"></div>
<!-- Cache-bust on each build tag change so stale bundles can't mask a real
     code change. After a rebuild, bump this version param (or hard-reload). -->
<script src="dist/gui.js?v=codex-anim-v6"></script>
</body>
